entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: trainwatch.contact@gmail.com
      storage: /acme/acme.json
      tlsChallenge: {}

providers:
  file:
    filename: /etc/traefik/services.prod.yml
    watch: true

log:
  level: INFO
