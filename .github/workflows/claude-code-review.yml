name: Claude Code Review

on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/claude-review')

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }}

            Once the review is complete, do the following in order:

            1. Post a general summary comment on the PR (not inline) that includes:
               - A brief overall assessment
               - Positives / what's done well
               - Issues / concerns found
               - Suggested improvements
               - Conclusion (approve / request changes / needs discussion)

            2. For each specific issue found, post an inline review comment directly on the relevant line using the GitHub pull request review API.
               Use GitHub suggestion blocks (```suggestion) wherever a concrete fix can be proposed, so the author can apply it with one click.
